<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>auteur-sync</title>
    <style>
      :root {
        --c-bg: rgb(10 10 10);
        --c-card: rgb(26 26 26);
        --c-chip: rgb(38 38 38);
        --c-hover: rgb(46 46 46);
        --c-border: rgb(42 42 42);
        --c-text: rgb(250 250 250);
        --c-text-secondary: rgb(163 163 163);
        --c-text-muted: rgb(115 115 115);
        --c-accent: rgb(168 85 247);
        --c-accent-hover: rgb(147 51 234);
        --c-accent-soft: rgb(168 85 247 / 0.15);
        --c-done: #10b981;
        --c-paused: #f59e0b;
        --c-failed: #ef4444;
        --c-err-bg: rgb(239 68 68 / 0.1);
        --c-err-border: rgb(239 68 68 / 0.35);
        --c-err-text: #fca5a5;
        font: 13px/1.45 Inter, system-ui, -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
        color-scheme: dark;
      }

      :root.light {
        --c-bg: rgb(245 245 245);
        --c-card: rgb(255 255 255);
        --c-chip: rgb(240 240 240);
        --c-hover: rgb(229 229 229);
        --c-border: rgb(229 229 229);
        --c-text: rgb(23 23 23);
        --c-text-secondary: rgb(82 82 82);
        --c-text-muted: rgb(115 115 115);
        --c-accent: rgb(147 51 234);
        --c-accent-hover: rgb(126 34 206);
        --c-accent-soft: rgb(147 51 234 / 0.12);
        --c-done: #10b981;
        --c-paused: #d97706;
        --c-failed: #dc2626;
        --c-err-bg: rgb(254 226 226);
        --c-err-border: rgb(252 165 165);
        --c-err-text: rgb(153 27 27);
        color-scheme: light;
      }

      * { box-sizing: border-box; }

      body {
        width: 320px;
        margin: 0;
        padding: 0;
        background: var(--c-bg);
        color: var(--c-text);
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 14px 8px;
      }
      header h1 {
        font-size: 13px;
        font-weight: 600;
        margin: 0;
        letter-spacing: 0.2px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }
      header h1 .brand-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--c-accent);
        box-shadow: 0 0 8px rgb(from var(--c-accent) r g b / 0.75);
      }

      .header-actions {
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      .icon-btn {
        background: var(--c-card);
        border: 1px solid var(--c-border);
        color: var(--c-text-secondary);
        width: 26px;
        height: 26px;
        border-radius: 6px;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        transition: background 0.15s, color 0.15s, border-color 0.15s;
      }
      .icon-btn:hover {
        background: var(--c-hover);
        color: var(--c-text);
        border-color: var(--c-text-muted);
      }
      .icon-btn svg {
        width: 14px;
        height: 14px;
        stroke: currentColor;
        fill: none;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .platforms {
        list-style: none;
        margin: 0;
        padding: 0 10px;
      }
      .platform {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 8px;
        border-radius: 8px;
        margin-bottom: 4px;
        background: var(--c-card);
        border: 1px solid var(--c-border);
        transition: border-color 0.15s, background 0.15s;
        cursor: pointer;
      }
      .platform:hover {
        border-color: var(--c-accent);
        background: var(--c-hover);
      }
      .platform .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        flex-shrink: 0;
      }
      .platform .dot.done { background: var(--c-done); box-shadow: 0 0 0 3px rgb(16 185 129 / 0.18); }
      .platform .dot.stale { background: var(--c-paused); box-shadow: 0 0 0 3px rgb(245 158 11 / 0.18); }
      .platform .dot.never { background: var(--c-text-muted); }

      .platform .meta {
        display: flex;
        flex-direction: column;
        flex: 1 1 auto;
        min-width: 0;
      }
      .platform .name {
        font-size: 13px;
        font-weight: 600;
        color: var(--c-text);
      }
      .platform .time {
        font-size: 11px;
        color: var(--c-text-muted);
        font-variant-numeric: tabular-nums;
      }
      .platform .time.done { color: var(--c-done); }
      .platform .time.stale { color: var(--c-paused); }
      .platform .time.never { color: var(--c-text-muted); }

      .go-btn {
        background: var(--c-accent-soft);
        color: var(--c-accent);
        border: 1px solid transparent;
        font: 12px/1 Inter, system-ui, sans-serif;
        padding: 6px 10px;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 500;
        white-space: nowrap;
        transition: background 0.15s, color 0.15s, border-color 0.15s;
      }
      .go-btn:hover {
        background: var(--c-accent);
        color: #fff;
      }

      .err {
        margin: 4px 14px 0;
        padding: 8px 10px;
        background: var(--c-err-bg);
        border: 1px solid var(--c-err-border);
        border-radius: 6px;
        color: var(--c-err-text);
        font-size: 11px;
        word-break: break-all;
      }

      footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 14px 12px;
        margin-top: 4px;
        color: var(--c-text-muted);
        font-size: 11px;
      }
      footer .ts { font-variant-numeric: tabular-nums; }
      footer .refresh {
        color: var(--c-text-secondary);
        background: none;
        border: none;
        cursor: pointer;
        padding: 0;
        font: inherit;
      }
      footer .refresh:hover { color: var(--c-accent); }
    </style>
  </head>
  <body>
    <header>
      <h1><span class="brand-dot"></span>auteur-sync</h1>
      <div class="header-actions">
        <button class="icon-btn" id="themeBtn" title="切换主题" aria-label="切换主题">
          <svg id="themeIcon" viewBox="0 0 24 24" aria-hidden="true"></svg>
        </button>
        <button class="icon-btn" id="optionsBtn" title="设置" aria-label="设置">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h.01A1.65 1.65 0 0 0 10 3.09V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v.01a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
      </div>
    </header>

    <ul class="platforms" id="platforms"></ul>

    <div id="errBox"></div>

    <footer>
      <span class="ts">最近上报 <span id="lastSent">—</span></span>
      <button class="refresh" id="refreshBtn">刷新</button>
    </footer>

    <script src="popup.js"></script>
  </body>
</html>
