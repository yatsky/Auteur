# Auteur frontend nginx config
#
# - SPA 路由：所有非 /api 请求 fallback 到 index.html
# - /api 反代到 backend 容器（端口 8082）；保留长连接超时给生图/合成等长任务（最长 ~15min）

server {
    listen       8080;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # 大文件上传（封面 / 参考图等）
    client_max_body_size 64m;

    # /api → backend:8082
    location /api/ {
        proxy_pass http://backend:8082;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 长任务（生图/合成/Agent 流式响应）需要长连接 + 关闭 buffer
        proxy_read_timeout    900s;
        proxy_send_timeout    900s;
        proxy_buffering       off;
        proxy_cache           off;
        chunked_transfer_encoding on;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源缓存
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri =404;
    }
}
