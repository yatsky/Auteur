name: publish-lazycat-image
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - context: backend
            image: auteur-backend-lazycat
          - context: frontend
            image: auteur-frontend-lazycat
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.context }}
          push: true
          tags: |
            ghcr.io/yatsky/${{ matrix.image }}:0.0.2
            ghcr.io/yatsky/${{ matrix.image }}:latest
